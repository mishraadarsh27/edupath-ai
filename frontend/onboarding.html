<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPath AI - Profile Setup</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <style>
        .split-layout { display: flex; min-height: 100vh; background: var(--neutral-light); }
        .sidebar { width: 30%; background: var(--primary); color: white; padding: 50px 40px; display: flex; flex-direction: column; justify-content: center; }
        .content { width: 70%; padding: 50px; display: flex; align-items: center; justify-content: center; }
        
        .tracker-item { display: flex; align-items: center; gap: 15px; margin-bottom: 40px; position: relative; opacity: 0.5; transition: all 0.3s; }
        .tracker-item::after { content: ''; position: absolute; left: 19px; top: 40px; bottom: -30px; width: 2px; background: rgba(255,255,255,0.1); }
        .tracker-item:last-child::after { display: none; }
        
        .tracker-icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: 'Poppins', sans-serif; z-index: 1; transition: all 0.3s; }
        
        .tracker-item.active { opacity: 1; }
        .tracker-item.active .tracker-icon { background: var(--secondary); box-shadow: 0 0 15px var(--secondary-glow); color: white; }
        .tracker-item.active h4 { color: white; }

        .form-card { width: 100%; max-width: 600px; padding: 40px; background: var(--white); border-radius: 16px; box-shadow: 0 15px 50px rgba(10,31,68,0.05); }
        .step-content { display: none; opacity: 0; transition: opacity 0.4s; }
        .step-content.active { display: block; opacity: 1; }
    </style>
</head>
<body style="background: var(--neutral-light);">

<div class="split-layout">
    <!-- LEFT SIDEBAR -->
    <div class="sidebar">
        <h2 style="color: white; margin-bottom: 50px; font-size: 2rem;">EduPath AI</h2>
        
        <div class="tracker-item active" id="track1">
            <div class="tracker-icon">1</div>
            <div><h4 style="margin:0; font-family:'Inter', sans-serif;">Personal Info</h4></div>
        </div>
        <div class="tracker-item" id="track2">
            <div class="tracker-icon">2</div>
            <div><h4 style="margin:0; font-family:'Inter', sans-serif;">Academic Background</h4></div>
        </div>
        <div class="tracker-item" id="track3">
            <div class="tracker-icon">3</div>
            <div><h4 style="margin:0; font-family:'Inter', sans-serif;">Preferences</h4></div>
        </div>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="content">
        <div class="form-card">
            <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Let's Get Started 👋</h1>
            <p class="text-muted" style="margin-bottom: 30px;">Complete your profile to unlock AI-driven insights.</p>

            <form id="onboardingForm">
                <!-- AI SCAN SECTION -->
                <div style="background: rgba(59, 130, 246, 0.05); border: 1px dashed var(--secondary); padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: center;">
                    <p style="font-size: 0.85rem; font-weight: 600; color: var(--primary); margin-bottom: 10px;">✨ Speed up! Auto-fill profile using AI Scan</p>
                    <input type="file" id="transcriptFile" style="display: none;" accept=".pdf" onchange="handleFileScan(this)">
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('transcriptFile').click()" id="scanBtn" style="font-size: 0.8rem; padding: 10px 20px;">
                        📄 Scan Transcript (PDF)
                    </button>
                    <div id="scanStatus" style="font-size: 0.75rem; color: var(--secondary); margin-top: 8px; display: none;">Scanning and parsing... please wait.</div>
                </div>

                <!-- STEP 1 -->
                <div class="step-content active" id="step1">
                    <div class="mb-4">
                        <label>Full Name</label>
                        <input type="text" id="name" required placeholder="e.g. Rahul Sharma">
                    </div>
                    <div class="mb-4">
                        <label>Email Address</label>
                        <input type="email" id="email" required placeholder="rahul@example.com">
                    </div>
                    <div class="mb-4">
                        <label>Referral Code (Optional)</label>
                        <input type="text" id="referral_code" placeholder="XYZ123" style="text-transform: uppercase;">
                    </div>
                    <div class="mt-8 flex justify-end">
                        <button type="button" class="btn btn-primary" onclick="goToStep(2)">Next →</button>
                    </div>
                </div>

                <!-- STEP 2 -->
                <div class="step-content" id="step2">
                    <div class="mb-4">
                        <label>Current Degree Program</label>
                        <input type="text" id="degree" required placeholder="B.Tech Computer Science">
                    </div>
                    <div class="mb-4">
                        <label>Cumulative GPA (out of 10)</label>
                        <input type="number" step="0.1" id="gpa" required placeholder="8.5">
                    </div>
                    <div class="mb-4">
                        <label>English Proficiency</label>
                        <select id="englishTest">
                            <option value="IELTS 7.0+">IELTS 7.0+ / TOEFL 100+</option>
                            <option value="IELTS 6.5">IELTS 6.0 - 6.5</option>
                            <option value="Not Taken Yet">Not Taken Yet</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label>Work Experience (Months)</label>
                        <input type="number" id="workExp" value="0" min="0" required>
                    </div>
                    <div class="mt-8 flex justify-between">
                        <button type="button" class="btn btn-outline" onclick="goToStep(1)">← Previous</button>
                        <button type="button" class="btn btn-primary" onclick="goToStep(3)">Next →</button>
                    </div>
                </div>

                <!-- STEP 3 -->
                <div class="step-content" id="step3">
                    <div class="mb-4">
                        <label>Target Country</label>
                        <select id="targetCountry" required>
                            <option value="USA">United States (USA)</option>
                            <option value="UK">United Kingdom (UK)</option>
                            <option value="Canada">Canada</option>
                            <option value="Germany">Germany</option>
                            <option value="Australia">Australia</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label>Target Course</label>
                        <select id="targetCourse" required>
                            <option value="MS CS">MS Computer Science</option>
                            <option value="MS Data Science">MS Data Science</option>
                            <option value="MBA">MBA</option>
                            <option value="Engineering Management">Engineering Management</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label>Estimated Budget (INR)</label>
                        <div class="flex items-center gap-4 mt-4">
                            <input type="range" id="budgetRange" min="1000000" max="6000000" step="500000" value="2500000" oninput="document.getElementById('bVal').innerText=parseInt(this.value).toLocaleString('en-IN')">
                            <b style="color:var(--primary); font-size:1.1rem; min-width:120px;">₹<span id="bVal">25,00,000</span></b>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label>Target Enrollment Month</label>
                        <input type="month" id="timeline" required>
                    </div>
                    <div class="mt-8 flex justify-between">
                        <button type="button" class="btn btn-outline" onclick="goToStep(2)">← Previous</button>
                        <button type="submit" id="submitBtn" class="btn btn-primary" style="box-shadow: 0 5px 15px var(--secondary-glow);">Complete Profile</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    window.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if (ref) {
            document.getElementById('referral_code').value = ref.toUpperCase();
        }
    });

    async function handleFileScan(input) {
        if (!input.files || !input.files[0]) return;
        
        const file = input.files[0];
        const status = document.getElementById('scanStatus');
        const btn = document.getElementById('scanBtn');
        
        status.style.display = 'block';
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const data = await api.scanTranscript(file);
            console.log("AI Extracted Data:", data);
            
            if (data.error) {
                alert("Scan failed: " + data.error);
            } else {
                // Auto-fill fields
                if (data.name) document.getElementById('name').value = data.name;
                if (data.degree) document.getElementById('degree').value = data.degree;
                if (data.gpa) document.getElementById('gpa').value = data.gpa;
                if (data.target_course) document.getElementById('targetCourse').value = data.target_course;
                
                alert("✨ Profile auto-filled using AI! Please review the details.");
                // Jump to Step 2 to show results
                goToStep(2);
            }
        } catch (e) {
            alert("System error during scan: " + e.message);
        } finally {
            status.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "📄 Scan Transcript (PDF)";
        }
    }

    function goToStep(n) {
        const currentStep = document.querySelector('.step-content.active');
        if (n > 1) {
            const inputs = currentStep.querySelectorAll('input, select');
            for (let input of inputs) {
                if (!input.checkValidity()) {
                    input.reportValidity();
                    return;
                }
            }
        }

        document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + n).classList.add('active');
        
        document.querySelectorAll('.tracker-item').forEach((t, index) => {
            if(index < n) t.classList.add('active');
            else t.classList.remove('active');
        });
    }

    document.getElementById("onboardingForm").addEventListener("submit", async(e) => {
        e.preventDefault();
        
        // Final validation check for ALL steps
        const form = e.target;
        if (!form.checkValidity()) {
            // Find the first invalid element
            const invalidElem = form.querySelector(':invalid');
            if (invalidElem) {
                // Determine which step it belongs to
                const step = invalidElem.closest('.step-content');
                const stepId = step.getAttribute('id');
                const stepNum = stepId.replace('step', '');
                goToStep(parseInt(stepNum));
                invalidElem.reportValidity();
                return;
            }
        }

        const btn = document.getElementById("submitBtn");
        btn.innerText = "Saving Profile...";
        btn.disabled = true;

        const payload = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            degree: document.getElementById('degree').value,
            gpa: parseFloat(document.getElementById('gpa').value),
            target_country: document.getElementById('targetCountry').value,
            target_course: document.getElementById('targetCourse').value,
            budget: parseInt(document.getElementById('budgetRange').value),
            timeline: document.getElementById('timeline').value,
            english_test: document.getElementById('englishTest').value,
            work_exp: parseInt(document.getElementById('workExp').value),
            referral_code: document.getElementById('referral_code').value.trim()
        };

        const res = await api.saveProfile(payload);
        
        if(res.student_id) {
            auth.saveStudentId(res.student_id);
            // Add referral code to saved profile if returned from server
            if(res.referral_code) payload.my_referral_code = res.referral_code;
            auth.saveProfile(payload);
            window.location.href = "dashboard.html";
        } else {
            alert("Error saving profile");
            btn.innerText = "Complete Profile";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
