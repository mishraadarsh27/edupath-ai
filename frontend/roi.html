<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROI Strategic Analyzer - EduPath AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>auth.checkAuthAndRedirect();</script>
    <style>
        :root {
            --slate-900: #0f172a;
            --purple-900: #1e1b4b;
            --electric-blue: #3b82f6;
            --electric-glow: rgba(59, 130, 246, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, var(--slate-900) 0%, var(--purple-900) 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px;
        }

        .container { max-width: 1100px; margin: 0 auto; }
        
        .header { margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
        .header p { color: var(--text-muted); font-size: 1.1rem; }

        .grid-layout {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
            align-items: start;
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            margin-bottom: 25px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus, select:focus { border-color: var(--electric-blue); box-shadow: 0 0 15px var(--electric-glow); }
        
        .calculate-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }
        .calculate-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.5); }

        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid var(--card-border); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: var(--electric-blue); }

        .chart-container {
            width: 100%;
            height: 380px;
            margin-top: 20px;
            position: relative;
        }

        #resultsArea { display: none; }
        
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; margin-bottom: 20px; font-weight: 500; transition: color 0.2s; }
        .back-link:hover { color: white; }

        @media (max-width: 900px) {
            .grid-layout { grid-template-columns: 1fr; }
            body { padding: 24px; }
            .header h1 { font-size: 2rem; }
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
            .glass-card { padding: 20px; }
            .stat-value { font-size: 1.2rem; }
            .chart-container { height: 280px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="dashboard.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Back to Dashboard
        </a>

        <div class="header">
            <p style="color: var(--electric-blue); font-weight: 600; margin-bottom: 5px;">FINANCIAL INTELLIGENCE</p>
            <h1>ROI Strategic Analyzer</h1>
            <p>Determine your potential break-even point and 10-year wealth trajectory.</p>
        </div>

        <div class="grid-layout">
            <!-- INPUT PANEL -->
            <div class="glass-card">
                <form id="roiForm">
                    <label>Investment Capital (INR)</label>
                    <input type="number" id="cost" placeholder="e.g. 4000000" required>
                    
                    <label>Target Economy</label>
                    <select id="country" required>
                        <option value="USA">United States (USD Base)</option>
                        <option value="UK">United Kingdom (GBP Base)</option>
                        <option value="Canada">Canada (CAD Base)</option>
                        <option value="Germany">Germany (EUR Base)</option>
                        <option value="Australia">Australia (AUD Base)</option>
                    </select>

                    <label>Academic Track</label>
                    <select id="courseType">
                        <option value="MS">STEM Masters (High ROI)</option>
                        <option value="MBA">Management (Aggressive ROI)</option>
                        <option value="UG">Undergraduate (Long-term ROI)</option>
                    </select>

                    <button type="submit" class="calculate-btn">Generate Forecast →</button>
                </form>
            </div>

            <!-- RESULTS PANEL -->
            <div id="resultsArea" class="glass-card">
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">TOTAL INVESTMENT</div>
                        <div class="stat-value" id="invDisp">₹ --</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">ESTIMATED BREAK-EVEN</div>
                        <div class="stat-value" id="breakeven" style="color: #10b981;">-- Years</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">10-YEAR NET PROFIT</div>
                        <div class="stat-value" id="netProfit">₹ --</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">ROI PERCENTAGE</div>
                        <div class="stat-value" id="roiPercent" style="color: #8b5cf6;">--%</div>
                    </div>
                </div>

                <h3 style="margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap:10px;">
                    <span style="width:12px; height:12px; border-radius:50%; background:var(--electric-blue); box-shadow:0 0 10px var(--electric-blue);"></span>
                    Cumulative Net Earnings Projection (In Lakhs ₹)
                </h3>

                <div class="chart-container">
                    <canvas id="roiLineChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        document.addEventListener("DOMContentLoaded", () => {
            const p = auth.getProfile();
            if(p) {
                document.getElementById("cost").value = p.budget;
                document.getElementById("country").value = p.target_country;
            }
        });

        document.getElementById("roiForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const cost = parseFloat(document.getElementById("cost").value);
            const country = document.getElementById("country").value;
            const courseType = document.getElementById("courseType").value;

            document.getElementById('resultsArea').style.display = 'block';
            
            // Call API
            const res = await api.calculateROI({ course_cost: cost, country, course_type: courseType });
            
            // Update Stats
            document.getElementById("invDisp").innerText = utils.formatCurrency(cost);
            document.getElementById("breakeven").innerText = `${res.breakeven_years} Years`;
            document.getElementById("netProfit").innerText = utils.formatCurrency(res.total_gain_10y - cost);
            document.getElementById("roiPercent").innerText = Math.round(((res.total_gain_10y - cost) / cost) * 100) + "%";

            // Prepare Chart Data
            // We simulate a 10 year growth trajectory based on the year 1, 3, 5 data
            const labels = ['Year 0', 'Year 1', 'Year 2', 'Year 3', 'Year 4', 'Year 5', 'Year 6', 'Year 7', 'Year 8', 'Year 9', 'Year 10'];
            
            // Cumulative Earnings starting with debt (negative cost)
            let cumulative = -cost;
            const data = [cumulative / 100000]; // in Lakhs
            
            // Simple growth interpolation
            const y1 = res.year1_salary;
            const y3 = res.year3_salary;
            const y5 = res.year5_salary;
            const annualGrowth = (y5 - y1) / 4;

            for(let i=1; i<=10; i++) {
                let currentSalary;
                if(i <= 1) currentSalary = y1;
                else if(i <= 3) currentSalary = y1 + ((y3 - y1) / 2) * (i - 1);
                else currentSalary = y3 + ((y5 - y3) / 2) * (i - 3);
                
                // Add salary to cumulative, subtract estimated cost of living (30% of salary)
                cumulative += (currentSalary * 0.7); 
                data.push(cumulative / 100000);
            }

            if(myChart) myChart.destroy();
            
            const ctx = document.getElementById('roiLineChart').getContext('2d');
            
            // Create Gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(59, 130, 246, 0.4)');
            gradient.addColorStop(1, 'rgba(59, 130, 246, 0.0)');

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Net Wealth Progression (Lakhs)',
                        data: data,
                        borderColor: '#3b82f6',
                        borderWidth: 4,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4,
                        pointBackgroundColor: '#3b82f6',
                        pointBorderColor: 'white',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) {
                                    return `Net Wealth: ₹${context.parsed.y.toFixed(2)} Lakhs`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false },
                            ticks: { color: '#94a3b8', font: { size: 11 } }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 11 } }
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
