<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROI Calculator - EduPath AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>auth.checkAuthAndRedirect();</script>
</head>
<body style="background: var(--neutral-light); min-height: 100vh;">

    <nav class="navbar">
        <div class="logo"><a href="dashboard.html" style="color:var(--neutral-dark);">← Back</a></div>
    </nav>

    <div class="container" style="margin-top: 100px; padding-bottom: 50px;">
        <h1 style="font-size: 2rem; color: var(--primary); margin-bottom: 30px;">Calculate Your Return on Investment</h1>
        
        <div class="grid grid-cols-2 gap-6" style="grid-template-columns: 45% 55%;">
            
            <!-- LEFT PANEL (INPUTS) -->
            <div class="card" style="background: var(--primary); color: white;">
                <form id="roiForm">
                    <div class="mb-4">
                        <label style="color: rgba(255,255,255,0.8); display:flex; align-items:center; gap:8px;">🎓 Tuition Cost (INR)</label>
                        <input type="number" id="cost" required style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; font-size:1.1rem; padding:12px;">
                    </div>
                    
                    <div class="mb-4 mt-8">
                        <label style="color: rgba(255,255,255,0.8); display:flex; align-items:center; gap:8px;">🌍 Destination Country</label>
                        <select id="country" required style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:var(--primary); font-size:1.1rem; padding:12px;">
                            <option value="USA">USA</option>
                            <option value="UK">UK</option>
                            <option value="Canada">Canada</option>
                            <option value="Germany">Germany</option>
                            <option value="Australia">Australia</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-full mt-8" style="font-size:1.1rem; padding:16px;">Calculate ROI</button>
                </form>
            </div>

            <!-- RIGHT PANEL (RESULTS) -->
            <div class="glass card" id="resultsCard" style="display:none; flex-direction:column; background:white;">
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div>
                        <p style="color:var(--neutral-dark);font-size:0.9rem;font-weight:600;">Total Investment</p>
                        <h2 id="invDisp" style="color:var(--primary);font-size:2.5rem;font-family:'Space Grotesk', sans-serif;">₹--</h2>
                    </div>
                    <div style="text-align:right;">
                        <p style="color:var(--neutral-dark);font-size:0.9rem;font-weight:600;">Expected Lifetime Earnings</p>
                        <h2 id="gain" style="color:var(--accent2);font-size:2rem;font-family:'Space Grotesk', sans-serif; display:flex; align-items:center; justify-content:flex-end; gap:5px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg> ₹--</h2>
                    </div>
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center; padding:20px; background:var(--neutral-light); border-radius:12px; margin-bottom:30px;">
                    <div>
                        <span style="font-size:0.9rem; color:var(--neutral-dark); font-weight:600;">Break-even Timeline</span>
                        <div style="font-size:1.5rem; font-weight:bold; color:var(--primary);" id="breakeven">-- years</div>
                    </div>
                    <div>
                        <span style="font-size:0.9rem; color:var(--neutral-dark); font-weight:600;">ROI Percentage</span>
                        <div style="font-size:1.5rem; font-weight:bold; color:var(--accent2);" id="roiPercent">--%</div>
                    </div>
                </div>

                <div style="position:relative; width:100%; height:250px;">
                    <canvas id="roiChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <script>
        let myChart = null;

        document.addEventListener("DOMContentLoaded", () => {
            const p = auth.getProfile();
            if(p) {
                document.getElementById("cost").value = p.budget;
                document.getElementById("country").value = p.target_country;
            }
        });

        document.getElementById("roiForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const payload = {
                course_cost: parseFloat(document.getElementById("cost").value),
                country: document.getElementById("country").value,
                course_type: "MS"
            };

            const rc = document.getElementById('resultsCard');
            rc.style.display = 'flex';
            
            const res = await api.calculateROI(payload);
            
            document.getElementById("invDisp").innerText = utils.formatCurrency(payload.course_cost);
            document.getElementById("breakeven").innerText = `${res.breakeven_years} years`;
            document.getElementById("gain").innerText = utils.formatCurrency(res.total_gain_10y);
            // mock ROI percent
            document.getElementById("roiPercent").innerText = Math.round((res.total_gain_10y / payload.course_cost) * 100) + "%";

            if(myChart) myChart.destroy();
            
            const ctx = document.getElementById('roiChart').getContext('2d');
            Chart.defaults.font.family = "'Inter', sans-serif";
            
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Year 1', 'Year 3', 'Year 5'],
                    datasets: [{
                        label: 'Projected Base Salary (INR)',
                        data: [res.year1_salary, res.year3_salary, res.year5_salary],
                        backgroundColor: '#6BCB77',
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        });
    </script>
</body>
</html>
