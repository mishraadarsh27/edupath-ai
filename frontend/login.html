<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduPath AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <style>
        :root {
            --slate-900: #0f172a;
            --purple-900: #1e1b4b;
            --electric-blue: #3b82f6;
            --electric-glow: rgba(59, 130, 246, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, var(--slate-900) 0%, var(--purple-900) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
            .logo-box { width: 50px; height: 50px; font-size: 1.2rem; margin-bottom: 20px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            width: 60px; height: 60px;
            background: var(--electric-blue);
            border-radius: 16px;
            margin: 0 auto 30px auto;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 800;
            box-shadow: 0 10px 20px var(--electric-glow);
        }

        h1 { font-size: 2rem; margin-bottom: 10px; font-weight: 700; }
        p { color: var(--text-muted); margin-bottom: 40px; }

        .input-group { text-align: left; margin-bottom: 25px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus { border-color: var(--electric-blue); box-shadow: 0 0 15px var(--electric-glow); }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }

        .footer-links { font-size: 0.9rem; color: var(--text-muted); }
        .footer-links a { color: var(--electric-blue); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">E</div>
        <h1>Welcome Back</h1>
        <p>Enter your profile email to access your dashboard.</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">Sign In</button>
        </form>

        <div class="footer-links">
            Don't have a profile? <a href="onboarding.html">Create One</a>
        </div>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const btn = document.getElementById("submitBtn");
            
            btn.innerText = "Verifying...";
            btn.disabled = true;

            const res = await api.login(email);
            
            if (res && res.id) {
                auth.saveStudentId(res.id);
                auth.saveProfile(res);
                window.location.href = "dashboard.html";
            } else {
                alert("No profile found with this email. Please check the email or create a new profile.");
                btn.innerText = "Sign In";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
