<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Recommendations - EduPath AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>auth.checkAuthAndRedirect();</script>
</head>
<body style="background: var(--neutral-light);">

    <nav class="navbar" style="border-bottom: 2px solid var(--neutral-light);">
        <div class="logo"><a href="dashboard.html" style="color:var(--neutral-dark);">← Back to Dashboard</a></div>
        <div class="nav-links">
            <span style="font-family:'Poppins', sans-serif; color:var(--primary); font-size:1.2rem;">University Navigator</span>
        </div>
    </nav>

    <!-- Top Filter Bar -->
    <div style="margin-top: 100px; max-width: 1400px; margin-left: auto; margin-right: auto; padding: 0 20px;">
        <div class="glass" style="display: flex; gap: 15px; padding: 15px 25px; border-radius: 12px; align-items: center; overflow-x: auto; white-space: nowrap;" id="filters">
            <span style="font-weight:600; color:var(--primary);">Filters:</span>
            <button class="btn btn-outline" style="border:none; background:var(--white); padding:8px 16px; border-radius:20px; box-shadow:0 2px 5px rgba(0,0,0,0.05);" onclick="loadUniversities('All')">All Countries 🌍</button>
            <button class="btn btn-outline" style="border:none; background:var(--white); padding:8px 16px; border-radius:20px; box-shadow:0 2px 5px rgba(0,0,0,0.05);" onclick="loadUniversities('USA')">USA 🇺🇸</button>
            <button class="btn btn-outline" style="border:none; background:var(--white); padding:8px 16px; border-radius:20px; box-shadow:0 2px 5px rgba(0,0,0,0.05);" onclick="loadUniversities('UK')">UK 🇬🇧</button>
            <button class="btn btn-outline" style="border:none; background:var(--white); padding:8px 16px; border-radius:20px; box-shadow:0 2px 5px rgba(0,0,0,0.05);" onclick="loadUniversities('Canada')">Canada 🇨🇦</button>
        </div>
    </div>

    <div class="main-layout">
        
        <!-- MAIN CONTENT - 3 COLUMN GRID -->
        <div class="content-area">
            <div id="loader" class="uni-grid">
                <!-- Skeletons -->
                <div class="card" style="height:350px; background:#e2e8f0; animation: pulse 1.5s infinite;"></div>
                <div class="card" style="height:350px; background:#e2e8f0; animation: pulse 1.5s infinite;"></div>
                <div class="card" style="height:350px; background:#e2e8f0; animation: pulse 1.5s infinite;"></div>
            </div>

            <div id="uniGrid" class="uni-grid" style="display:none;"></div>
        </div>

        <!-- RIGHT SIDEBAR (25%) -->
        <div class="side-info">
            <div class="card" style="background: var(--primary); color: white;">
                <h3 style="color:white; margin-bottom:15px;">AI Summary ✨</h3>
                <p style="font-size:0.9rem; opacity:0.9; margin-bottom:20px;">Based on your inputs, you have a strong profile for Top 100 universities globally. We recommend targeting ROI-heavy options.</p>
                <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:8px; margin-bottom:10px;">
                    <span style="font-size:0.8rem; opacity:0.8;">Avg Match Score</span><br>
                    <b style="font-size:1.5rem; color:var(--accent2);">84%</b>
                </div>
            </div>
        </div>

    </div>

    <style>
        .main-layout { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: flex; gap: 30px; }
        .content-area { flex-grow: 1; }
        .side-info { width: 300px; flex-shrink: 0; }
        .uni-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }

        @media (max-width: 1100px) {
            .uni-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 900px) {
            .main-layout { flex-direction: column-reverse; }
            .side-info { width: 100%; }
            div[style*="margin-top: 100px"] { margin-top: 70px !important; }
        }

        @media (max-width: 600px) {
            .uni-grid { grid-template-columns: 1fr; }
            #filters { padding: 10px; }
        }
    </style>

    <script>
        const profile = auth.getProfile();
        
        async function loadUniversities(filterCountry = 'All') {
            document.getElementById('loader').style.display = 'grid';
            document.getElementById('uniGrid').style.display = 'none';

            // Active filter visual
            document.querySelectorAll('#filters button').forEach(b => {
                if (b.innerText.includes(filterCountry) || (filterCountry === 'All' && b.innerText.includes('All'))) {
                    b.style.background = 'var(--primary)';
                    b.style.color = 'white';
                } else {
                    b.style.background = 'var(--white)';
                    b.style.color = 'var(--neutral-dark)';
                }
            });

            const payload = {
                gpa: profile.gpa,
                target_country: filterCountry === 'All' ? 'All' : filterCountry,
                target_course: profile.target_course
            };

            const data = await api.recommendUniversities(payload);
            const grid = document.getElementById('uniGrid');
            grid.innerHTML = '';
            
            if(data.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; padding:50px;">No universities found.</div>';
            } else {
                data.forEach(u => {
                    let scoreColor = u.match_percent >= 90 ? 'var(--accent2)' : (u.match_percent >= 70 ? 'var(--accent1)' : 'var(--secondary)');

                    grid.innerHTML += `
                        <div class="card" style="padding: 0; overflow: hidden; display:flex; flex-direction:column;">
                            <div style="height: 140px; background: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1470&auto=format&fit=crop') center/cover;"></div>
                            <div style="padding: 24px; position: relative;">
                                <!-- Circular Match Score -->
                                <div style="position:absolute; top:-30px; right:20px; width:60px; height:60px; border-radius:50%; background:white; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.1); border: 3px solid ${scoreColor}; font-weight:bold; font-size:1.1rem; color:${scoreColor};">${u.match_percent}%</div>
                                
                                <h3 style="font-size: 1.25rem; font-family:'Poppins', sans-serif; color:var(--primary); margin-bottom:5px;">${u.name}</h3>
                                <p style="color:var(--neutral-dark); font-size:0.85rem; opacity:0.8; margin-bottom:15px;">📍 ${u.country}</p>
                                
                                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.9rem; border-bottom:1px solid #eee; padding-bottom:10px;">
                                    <span style="color:var(--neutral-dark);">Ranking</span>
                                    <strong style="color:var(--primary);">#${u.ranking}</strong>
                                </div>
                                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:0.9rem;">
                                    <span style="color:var(--neutral-dark);">Est. Cost</span>
                                    <strong style="color:var(--primary);">${utils.formatCurrency(u.annual_cost_inr)}/yr</strong>
                                </div>

                                <a href="https://${u.website}" target="_blank" class="btn" style="width:100%; border: 1px solid var(--secondary); color:var(--secondary); padding:10px;">View Details →</a>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('loader').style.display = 'none';
            grid.style.display = 'grid';
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadUniversities(profile.target_country || 'All');
        });
    </script>
</body>
</html>
