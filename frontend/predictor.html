<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Predictor - EduPath AI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>auth.checkAuthAndRedirect();</script>
</head>
<body style="background: var(--neutral-light);">

    <nav class="navbar" style="border-bottom: 2px solid var(--neutral-light);">
        <div class="logo"><a href="dashboard.html" style="color:var(--neutral-dark);">← Back to Dashboard</a></div>
        <div class="nav-links">
            <span style="font-family:'Poppins', sans-serif; color:var(--primary); font-size:1.2rem;">Admission Predictor</span>
        </div>
    </nav>

    <div class="container py-12" style="margin-top: 100px;">
        <h1 style="color: var(--primary); text-align:center; font-size: 2.2rem; margin-bottom: 40px;">Predict Your Admission Chances</h1>
        
        <div class="grid grid-cols-2 gap-6" style="align-items:start;">
            
            <div class="card" style="background:var(--white);">
                <form id="predictForm">
                    <div class="mb-4">
                        <label style="display:flex; justify-content:space-between;"><span>Cumulative GPA</span> <b id="gpaVal" style="color:var(--secondary);">8.5</b></label>
                        <input type="range" id="gpa" min="5" max="10" step="0.1" value="8.5" oninput="document.getElementById('gpaVal').innerText=this.value" required>
                    </div>
                    
                    <div class="mb-4 mt-6">
                        <label style="display:flex; justify-content:space-between;"><span>English Test Score (IELTS/TOEFL Band)</span> <b id="ieltsVal" style="color:var(--secondary);">7.0</b></label>
                        <input type="range" id="ielts" min="5" max="9" step="0.5" value="7.0" oninput="document.getElementById('ieltsVal').innerText=this.value" required>
                    </div>
                    
                    <div class="mb-4 mt-6">
                        <label style="display:flex; justify-content:space-between;"><span>Work Experience (Years)</span> <b id="workVal" style="color:var(--secondary);">2</b></label>
                        <input type="range" id="work" min="0" max="10" step="1" value="2" oninput="document.getElementById('workVal').innerText=this.value" required>
                    </div>

                    <div class="mb-4 mt-6">
                        <label style="display:flex; justify-content:space-between;"><span>Statement of Purpose (SOP) Strength</span> <b id="sopVal" style="color:var(--secondary);">4/5</b></label>
                        <input type="range" id="sop" min="1" max="5" step="1" value="4" oninput="document.getElementById('sopVal').innerText=this.value+'/5'" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-full mt-8" style="padding:16px; font-size:1.1rem;">Predict Chances</button>
                </form>
            </div>

            <div class="card" id="resultsCard" style="display:none; flex-direction:column; text-align:center; align-items:center; background:linear-gradient(135deg, var(--white) 0%, var(--neutral-light) 100%);">
                <h3 style="color:var(--neutral-dark); margin-bottom:30px;">Algorithmic Probability</h3>
                
                <div style="width:180px; height:180px; border-radius:50%; background:var(--white); box-shadow:0 15px 35px rgba(0,0,0,0.05); display:flex; align-items:center; justify-content:center; border: 8px solid var(--accent2);" id="chanceCircle">
                    <span style="font-size:3.5rem; font-weight:bold; font-family:'Space Grotesk', sans-serif; color:var(--primary);"><span id="chance">--</span><span style="font-size:1.5rem">%</span></span>
                </div>

                <div style="margin-top:40px; background:rgba(10,31,68,0.03); border:1px solid rgba(10,31,68,0.05); padding:20px; border-radius:12px; text-align:left; width:100%;">
                    <h4 style="margin-bottom:10px; color:var(--primary); display:flex; align-items:center; gap:8px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--secondary)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        Oracle Insights
                    </h4>
                    <p style="color:var(--neutral-dark); font-size:0.95rem; line-height:1.5;" id="tip">--</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const p = auth.getProfile();
            if(p) {
                document.getElementById("gpa").value = p.gpa;
                document.getElementById('gpaVal').innerText = p.gpa;
            }
        });

        document.getElementById("predictForm").addEventListener("submit", async(e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const original = btn.innerText;
            btn.innerText = 'Calculating...';
            
            const payload = {
                gpa: parseFloat(document.getElementById("gpa").value),
                english_score: parseFloat(document.getElementById("ielts").value),
                work_exp: parseFloat(document.getElementById("work").value),
                sop_score: parseFloat(document.getElementById("sop").value)
            };

            const res = await api.predictAdmission(payload);
            
            const rc = document.getElementById('resultsCard');
            rc.style.display = 'flex';
            rc.classList.add('fade-in');
            
            const circle = document.getElementById("chanceCircle");
            document.getElementById("chance").innerText = res.probability;
            
            if(res.probability >= 70) {
                circle.style.borderColor = 'var(--accent2)';
            } else if(res.probability >= 40) {
                circle.style.borderColor = 'var(--accent1)';
            } else {
                circle.style.borderColor = 'var(--secondary)';
            }

            document.getElementById("tip").innerText = res.tips;
            btn.innerText = original;
        });
    </script>
</body>
</html>
